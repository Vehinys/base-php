security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\AppAuthenticator
            # Vérifie isVerified avant toute connexion locale (OAuth = always verified)
            user_checker: App\Security\UserChecker
            custom_authenticators:
                - App\Security\AppAuthenticator
                - App\Security\GoogleAuthenticator
                - App\Security\DiscordAuthenticator
            logout:
                path: app_logout
                target: app_home
                # Protège le logout contre le CSRF — requête POST + token _csrf_token requis
                enable_csrf: true
                csrf_token_id: logout
                csrf_parameter: _csrf_token
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                samesite: lax
            # Bloque une IP après 5 échecs d'authentification sur 15 minutes (symfony/rate-limiter requis)
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/verify, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        - { path: ^/locale, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
